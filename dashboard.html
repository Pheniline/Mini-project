<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GridGuard Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dashboard">
      <h1>GRIDGUARD LIVE CONTROL CENTER</h1>

      <div class="card">
        <h2>Transformer Status</h2>

        <p><strong>Voltage:</strong> <span id="voltage">0 V</span></p>

        <p><strong>Current:</strong> <span id="current">0 A</span></p>

        <p><strong>Temperature:</strong> <span id="temperature">0 °C</span></p>
      </div>

      <div class="alerts">
        <h2>ALERTS</h2>

        <div id="alerts">
          <p>Loading...</p>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
