<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GridGuard Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dashboard">
      <h1>GRIDGUARD CONTROL CENTER</h1>

      <div class="card">
        <h2>Zone A</h2>
        <p>Status: NORMAL</p>
        <p>Voltage: 230V</p>
        <p>Current: 12A</p>
      </div>

      <div class="card danger">
        <h2>Zone B</h2>
        <p>Status: OVERLOAD</p>
        <p>Voltage: 260V</p>
        <p>Current: 20A</p>
      </div>

      <div class="alerts">
        <h2>ALERTS</h2>
        <ul>
          <li>Transformer overheating</li>
          <li>Unauthorized access detected</li>
        </ul>
      </div>
    </div>
  </body>
</html>
